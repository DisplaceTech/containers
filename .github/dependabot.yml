version: 2
updates:
  # Monitor all container Dockerfiles in one configuration
  # Dependabot will automatically discover all Dockerfiles recursively
  - package-ecosystem: "docker"
    directory: "/containers"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # reviewers:
      # - "your-github-username"  # Add your GitHub username here
    labels:
      - "dependencies"
      - "docker"
      - "security"
    # Group updates by base image to reduce PR noise
    groups:
      alpine-updates:
        patterns:
          - "alpine"
          - "alpine:*"
      php-updates:
        patterns:
          - "php*"
      apache-updates:
        patterns:
          - "apache*"
          - "httpd*"
      mariadb-updates:
        patterns:
          - "mariadb*"
          - "mysql*"
    # Only create PRs for security updates and major/minor versions
    # Ignore patch-level updates to reduce noise
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Monitor GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # reviewers:
      # - "your-github-username"  # Add your GitHub username here
    labels:
      - "dependencies"
      - "github-actions"
    # Group all GitHub Actions updates together
    groups:
      github-actions:
        patterns:
          - "*"
