version: 2
updates:
  # Monitor Dockerfile dependencies
  - package-ecosystem: "docker"
    directory: "/apache"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "displacetech/containers-team"
    labels:
      - "dependencies"
      - "docker"
      - "apache"
    
  - package-ecosystem: "docker"
    directory: "/php-fpm"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "displacetech/containers-team"
    labels:
      - "dependencies"
      - "docker"
      - "php-fpm"
    
  - package-ecosystem: "docker"
    directory: "/mariadb"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "displacetech/containers-team"
    labels:
      - "dependencies"
      - "docker"
      - "mariadb"
    
  - package-ecosystem: "docker"
    directory: "/wordpress"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "displacetech/containers-team"
    labels:
      - "dependencies"
      - "docker"
      - "wordpress"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "displacetech/containers-team"
    labels:
      - "dependencies"
      - "github-actions"