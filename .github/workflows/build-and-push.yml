name: Build and Push Container Images

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'containers/**'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'containers/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:
    inputs:
      container:
        description: 'Container to build (all, apache, php-fpm, mariadb, wordpress)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - apache
          - php-fpm
          - mariadb
          - wordpress
      push_images:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: displacetech

jobs:
  # Detect which containers have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apache: ${{ steps.changes.outputs.apache }}
      php-fpm: ${{ steps.changes.outputs.php-fpm }}
      mariadb: ${{ steps.changes.outputs.mariadb }}
      wordpress: ${{ steps.changes.outputs.wordpress }}
      any-changes: ${{ steps.changes.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            apache:
              - 'containers/apache/**'
            php-fpm:
              - 'containers/php-fpm/**'
            mariadb:
              - 'containers/mariadb/**'
            wordpress:
              - 'containers/wordpress/**'
            changes:
              - 'containers/**'

  # Build Apache container
  build-apache:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() && (
        needs.detect-changes.outputs.apache == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'apache'
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Apache
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/apache
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=2.4,enable={{is_default_branch}}

      - name: Build and push Apache image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/apache/2.4
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build PHP-FPM containers (matrix for versions)
  build-php-fpm:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() && (
        needs.detect-changes.outputs.php-fpm == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'php-fpm'
      )
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        php_version: ['8.3', '8.4']
        include:
          - php_version: '8.3'
            php_full_version: '8.3.26'
            is_latest: false
          - php_version: '8.4'
            php_full_version: '8.4.13'
            is_latest: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for PHP-FPM ${{ matrix.php_version }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/php-fpm
          tags: |
            type=ref,event=branch,suffix=-php${{ matrix.php_version }}
            type=ref,event=pr,suffix=-php${{ matrix.php_version }}
            type=raw,value=latest,enable={{is_default_branch}},enable=${{ matrix.is_latest }}
            type=raw,value=${{ matrix.php_version }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.php_full_version }},enable={{is_default_branch}}

      - name: Build and push PHP-FPM ${{ matrix.php_version }} image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/php-fpm/${{ matrix.php_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=php-fpm-${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=php-fpm-${{ matrix.php_version }}

  # Build MariaDB container
  build-mariadb:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() && (
        needs.detect-changes.outputs.mariadb == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'mariadb'
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for MariaDB
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/mariadb
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=11,enable={{is_default_branch}}

      - name: Build and push MariaDB image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/mariadb/11.5
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build WordPress containers (matrix for PHP versions)
  build-wordpress:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() && (
        needs.detect-changes.outputs.wordpress == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'wordpress'
      )
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        php_version: ['8.3', '8.4']
        include:
          - php_version: '8.3'
            wordpress_version: '6.8.3'
          - php_version: '8.4'
            wordpress_version: '6.8.3'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for WordPress ${{ matrix.wordpress_version }}-php${{ matrix.php_version }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/wordpress
          tags: |
            type=ref,event=pr
            type=raw,value=${{ matrix.wordpress_version }}-php${{ matrix.php_version }},enable={{is_default_branch}}

      - name: Build and push WordPress ${{ matrix.wordpress_version }}-php${{ matrix.php_version }} image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/wordpress/${{ matrix.wordpress_version }}-php${{ matrix.php_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=wordpress-${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=wordpress-${{ matrix.php_version }}

  # Test WordPress stack integration
  test-wordpress-stack:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-mariadb, build-wordpress]
    if: |
      always() && !cancelled() && (
        needs.detect-changes.outputs.wordpress == 'true' ||
        needs.detect-changes.outputs.mariadb == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'wordpress' ||
        github.event.inputs.container == 'mariadb'
      )
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Test WordPress complete stack
        run: |
          # Use local images if this is a PR, otherwise use registry images
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Testing with locally built images (PR mode)"
            # In a real scenario, you would modify the compose file to use local image tags
            echo "Skipping integration test for PR - would need local image tags"
          else
            echo "Testing WordPress complete stack..."
            cd examples
            timeout 300 docker compose -f wordpress-complete.yml up -d
            
            # Wait for services to be healthy
            echo "Waiting for services to be healthy..."
            sleep 60
            
            # Test WordPress response
            timeout 60 bash -c 'until curl -f http://localhost:8080; do sleep 2; done'
            echo "✅ WordPress is responding"
            
            # Test database connection - more robust approach
            echo "Testing database connection..."
            # First, wait for WordPress to be fully initialized
            sleep 30
            
            # Check if WordPress can connect to database via WP-CLI
            if docker compose -f wordpress-complete.yml exec -T -w /var/www/html wordpress wp --allow-root core is-installed; then
              echo "✅ WordPress is installed and database connection working"
            else
              echo "WordPress not yet installed, checking database connectivity directly..."
              docker compose -f wordpress-complete.yml exec -T -w /var/www/html wordpress wp --allow-root db check
              echo "✅ Database connection working (WordPress not installed yet)"
            fi
            
            # Cleanup
            docker compose -f wordpress-complete.yml down -v
          fi

  # Test individual containers (basic health checks)
  test-containers:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-apache, build-php-fpm, build-mariadb, build-wordpress]
    if: |
      always() && !cancelled() && (
        needs.detect-changes.outputs.apache == 'true' ||
        needs.detect-changes.outputs.php-fpm == 'true' ||
        needs.detect-changes.outputs.mariadb == 'true' ||
        needs.detect-changes.outputs.wordpress == 'true' ||
        github.event.inputs.container == 'all' ||
        github.event.inputs.container == 'apache' ||
        github.event.inputs.container == 'php-fpm' ||
        github.event.inputs.container == 'mariadb' ||
        github.event.inputs.container == 'wordpress'
      )
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Apache container
        if: |
          needs.detect-changes.outputs.apache == 'true' ||
          github.event.inputs.container == 'all' ||
          github.event.inputs.container == 'apache'
        run: |
          echo "Testing Apache container basic functionality..."
          docker pull ghcr.io/displacetech/apache:latest
          docker run --rm -d --name test-apache -p 8081:80 ghcr.io/displacetech/apache:latest
          sleep 10
          curl -f http://localhost:8081 && echo "✅ Apache responding"
          docker stop test-apache
          
      - name: Test PHP-FPM container
        if: |
          needs.detect-changes.outputs.php-fpm == 'true' ||
          github.event.inputs.container == 'all' ||
          github.event.inputs.container == 'php-fpm'
        run: |
          echo "Testing PHP-FPM container basic functionality..."
          docker pull ghcr.io/displacetech/php-fpm:latest
          docker run --rm -d --name test-php-fpm ghcr.io/displacetech/php-fpm:latest
          sleep 5
          docker exec test-php-fpm php --version && echo "✅ PHP-FPM responding"
          docker stop test-php-fpm
          
      - name: Test MariaDB container
        if: |
          needs.detect-changes.outputs.mariadb == 'true' ||
          github.event.inputs.container == 'all' ||
          github.event.inputs.container == 'mariadb'
        run: |
          echo "Testing MariaDB container basic functionality..."
          docker pull ghcr.io/displacetech/mariadb:latest
          docker run --rm -d --name test-mariadb \
            -e MYSQL_ROOT_PASSWORD=test123 \
            -e MYSQL_DATABASE=testdb \
            ghcr.io/displacetech/mariadb:latest
          sleep 15
          docker exec test-mariadb mariadb-admin ping -h localhost && echo "✅ MariaDB responding"
          docker stop test-mariadb
          
      - name: Test WordPress containers
        if: |
          needs.detect-changes.outputs.wordpress == 'true' ||
          github.event.inputs.container == 'all' ||
          github.event.inputs.container == 'wordpress'
        run: |
          echo "Testing WordPress containers basic functionality..."
          
          # Test PHP 8.4 version
          echo "Testing WordPress 6.8.3-php8.4..."
          docker pull ghcr.io/displacetech/wordpress:6.8.3-php8.4
          docker run --rm -d --name test-wordpress-84 -p 8082:8080 \
            -e WORDPRESS_DB_HOST=fake-host \
            -e WORDPRESS_DB_NAME=wordpress \
            -e WORDPRESS_DB_USER=wordpress \
            -e WORDPRESS_DB_PASSWORD=password \
            ghcr.io/displacetech/wordpress:6.8.3-php8.4
          sleep 15
          
          # Test that Apache is running and WordPress files are present
          docker exec test-wordpress-84 ls -la /var/www/html/wp-config.php
          docker exec test-wordpress-84 php --version | grep "PHP 8.4"
          echo "✅ WordPress 6.8.3-php8.4 responding"
          docker stop test-wordpress-84
          
          # Test PHP 8.3 version  
          echo "Testing WordPress 6.8.3-php8.3..."
          docker pull ghcr.io/displacetech/wordpress:6.8.3-php8.3
          docker run --rm -d --name test-wordpress-83 -p 8083:8080 \
            -e WORDPRESS_DB_HOST=fake-host \
            -e WORDPRESS_DB_NAME=wordpress \
            -e WORDPRESS_DB_USER=wordpress \
            -e WORDPRESS_DB_PASSWORD=password \
            ghcr.io/displacetech/wordpress:6.8.3-php8.3
          sleep 15
          
          # Test that Apache is running and WordPress files are present
          docker exec test-wordpress-83 ls -la /var/www/html/wp-config.php
          docker exec test-wordpress-83 php --version | grep "PHP 8.3"
          echo "✅ WordPress 6.8.3-php8.3 responding"
          docker stop test-wordpress-83

  # Summary job
  build-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-apache, build-php-fpm, build-mariadb, build-wordpress, test-containers, test-wordpress-stack]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.detect-changes.outputs.any-changes }}" == "true" || "${{ github.event.inputs.container }}" != "" ]]; then
            echo "## Built Containers:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            [[ "${{ needs.build-apache.result }}" == "success" ]] && echo "✅ Apache 2.4.65" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.build-php-fpm.result }}" == "success" ]] && echo "✅ PHP-FPM 8.3 & 8.4" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.build-mariadb.result }}" == "success" ]] && echo "✅ MariaDB 11.5" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.build-wordpress.result }}" == "success" ]] && echo "✅ WordPress 6.8.3 (PHP 8.3 & 8.4)" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Registry Information:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Registry**: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Available at**: https://github.com/orgs/DisplaceTech/packages" >> $GITHUB_STEP_SUMMARY
          else
            echo "No container changes detected." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test-containers.result }}" == "success" ]]; then
            echo "✅ **Container health checks passed**" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.test-containers.result }}" == "failure" ]]; then
            echo "❌ **Container health checks failed**" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.test-containers.result }}" == "skipped" ]]; then
            echo "⏸️ **Container health checks skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ needs.test-wordpress-stack.result }}" == "success" ]]; then
            echo "✅ **WordPress integration tests passed**" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.test-wordpress-stack.result }}" == "failure" ]]; then
            echo "❌ **WordPress integration tests failed**" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.test-wordpress-stack.result }}" == "skipped" ]]; then
            echo "⏸️ **WordPress integration tests skipped**" >> $GITHUB_STEP_SUMMARY
          fi
