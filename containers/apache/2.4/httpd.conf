# Apache HTTP Server Configuration
# Optimized for containers - Displace Technologies

# Basic server configuration
ServerRoot /var/www
Listen 80
Listen 443 ssl

# Modules - Alpine Linux paths
LoadModule mpm_prefork_module /usr/lib/apache2/mod_mpm_prefork.so
LoadModule authz_core_module /usr/lib/apache2/mod_authz_core.so
LoadModule dir_module /usr/lib/apache2/mod_dir.so
LoadModule mime_module /usr/lib/apache2/mod_mime.so
LoadModule rewrite_module /usr/lib/apache2/mod_rewrite.so
LoadModule headers_module /usr/lib/apache2/mod_headers.so
LoadModule ssl_module /usr/lib/apache2/mod_ssl.so
LoadModule unixd_module /usr/lib/apache2/mod_unixd.so
LoadModule log_config_module /usr/lib/apache2/mod_log_config.so

# Process management
StartServers 2
MinSpareServers 2
MaxSpareServers 10
MaxRequestWorkers 150
MaxConnectionsPerChild 1000

# User and Group - Running as non-root
User apache
Group apache

# Server identification
ServerTokens Prod
ServerSignature Off

# Default document root
DocumentRoot /var/www/html

# Directory permissions
<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory /var/www/html>
    AllowOverride All
    Options -Indexes -Includes -FollowSymLinks
    Require all granted
    
    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
</Directory>

# Default file handling
DirectoryIndex index.html index.php

# MIME type configuration
TypesConfig /etc/apache2/mime.types

# Logging
ErrorLog /var/log/apache2/error.log
CustomLog /var/log/apache2/access.log combined
LogLevel warn

# Hide server version in error pages
# (ServerTokens already set above)

# Disable server-info and server-status
<Location "/server-info">
    Require all denied
</Location>

<Location "/server-status">
    Require all denied
</Location>

# Prevent access to .htaccess files
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# Prevent access to sensitive files
<FilesMatch "\.(env|git|svn|log|bak|backup|old|tmp|temp|conf|ini)$">
    Require all denied
</FilesMatch>

# Timeout settings
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# Include additional configurations
IncludeOptional conf.d/*.conf