; PHP-FPM www pool configuration
; Optimized for WordPress - Displace Technologies

[www]

; Pool user and group
user = www-data
group = www-data

; Listen on port 9000 (accessible from other containers)
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process management
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Security settings
security.limit_extensions = .php

; Access log
access.log = /var/log/php-fpm/access.log
access.format = "%R - %u [%t] \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; Slow log
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 10s

; Additional environment variables
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; PHP settings for this pool
php_admin_value[sendmail_path] = /usr/sbin/sendmail -t -i -f www@localhost
php_admin_value[error_log] = /var/log/php-fpm/www-error.log
php_admin_flag[log_errors] = on
php_value[session.save_handler] = files
php_value[session.save_path] = /tmp