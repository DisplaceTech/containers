# Apache HTTP Server Configuration for WordPress
# Optimized for containers - Displace Technologies

# Basic server configuration
ServerRoot /var/www
Listen 8080

# User and group
User apache
Group apache

# Modules
LoadModule mpm_prefork_module modules/mod_mpm_prefork.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule authz_user_module modules/mod_authz_user.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule auth_basic_module modules/mod_auth_basic.so
LoadModule authn_file_module modules/mod_authn_file.so
LoadModule authz_groupfile_module modules/mod_authz_groupfile.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule headers_module modules/mod_headers.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule php_module /usr/lib/apache2/mod_php83.so

# Process management
StartServers 2
MinSpareServers 2
MaxSpareServers 10
MaxRequestWorkers 150
MaxConnectionsPerChild 1000

# Server identification
ServerTokens Prod
ServerSignature Off

# Default document root
DocumentRoot /var/www/html

# Default file handling
DirectoryIndex index.php index.html

# MIME type configuration
TypesConfig /etc/apache2/mime.types
AddType application/x-httpd-php .php

# PHP configuration
<FilesMatch \.php$>
    SetHandler application/x-httpd-php
</FilesMatch>

# Directory permissions
<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory /var/www/html>
    AllowOverride All
    Options -Indexes -Includes +FollowSymLinks
    Require all granted
    
    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # WordPress-friendly rewrites
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.php [L]
    </IfModule>
</Directory>

# Logging
ErrorLog /var/log/apache2/error.log
CustomLog /var/log/apache2/access.log combined
LogLevel warn

# Prevent access to .htaccess files
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# Prevent access to sensitive files
<FilesMatch "\.(env|git|svn|log|bak|backup|old|tmp|temp|conf|ini)$">
    Require all denied
</FilesMatch>

# WordPress specific protections
<FilesMatch "^(wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt)">
    Require all denied
</FilesMatch>

# Protect wp-content/uploads from PHP execution
<Directory /var/www/html/wp-content/uploads>
    <FilesMatch "\.(php|phtml|php3|php4|php5|pl|py|jsp|asp|sh|cgi)$">
        Require all denied
    </FilesMatch>
</Directory>

# Timeout settings
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5