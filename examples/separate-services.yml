# Separate Services Example - Displace Technologies Container Library
# This example demonstrates using individual containers as separate services

version: '3.8'

services:
  # Apache Web Server
  web:
    image: ghcr.io/DisplaceTech/apache:latest
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
      - ./apache-config:/etc/apache2/conf.d:ro
      - web_logs:/var/log/apache2
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # PHP-FPM 8.4
  php:
    image: ghcr.io/DisplaceTech/php-fpm:8.4
    volumes:
      - ./html:/var/www/html
      - ./php-config:/etc/php84/conf.d:ro
      - php_logs:/var/log/php-fpm
    depends_on:
      - database
    restart: unless-stopped
    networks:
      - backend

  # MariaDB Database
  database:
    image: ghcr.io/DisplaceTech/mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: secure_root_password
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: secure_user_password
    volumes:
      - db_data:/var/lib/mysql
      - db_logs:/var/log/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - backend

  # Redis Cache (optional)
  cache:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass cachepass123
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  web_logs:
    driver: local
  php_logs:
    driver: local
  db_logs:
    driver: local

networks:
  frontend:
    name: web_frontend
  backend:
    name: services_backend