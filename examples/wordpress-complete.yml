# Complete WordPress Stack - Displace Technologies Container Library
# This example provides a full WordPress installation using our custom containers

services:
  # WordPress with PHP 8.4 and Apache
  wordpress:
    image: ghcr.io/displacetech/wordpress:6.8.3-php8.4
    ports:
      - "8080:8080"
    environment:
      # Database configuration
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: secure_wp_password
      WORDPRESS_TABLE_PREFIX: wp_
      
      # Auto-installation (optional - remove for manual setup)
      WORDPRESS_AUTO_INSTALL: "true"
      WORDPRESS_URL: http://localhost:8080
      WORDPRESS_TITLE: "My WordPress Site"
      WORDPRESS_ADMIN_USER: admin
      WORDPRESS_ADMIN_PASSWORD: change_this_password
      WORDPRESS_ADMIN_EMAIL: admin@example.com
      
      # WordPress configuration
      WORDPRESS_DEBUG: "false"
      WORDPRESS_DEBUG_LOG: "false"
    volumes:
      - wordpress_data:/var/www/html
      - wordpress_logs:/var/log/apache2
    depends_on:
      - mariadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MariaDB Database
  mariadb:
    image: ghcr.io/displacetech/mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: secure_root_password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: secure_wp_password
    volumes:
      - mariadb_data:/var/lib/mysql
      - mariadb_logs:/var/log/mysql
      # Optional: Custom initialization scripts
      # - ./initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wordpress_data:
    driver: local
  mariadb_data:
    driver: local
  wordpress_logs:
    driver: local
  mariadb_logs:
    driver: local

networks:
  default:
    name: wordpress_network